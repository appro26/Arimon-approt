<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Appro Playbook 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body class="player-mode">

    <div class="role-switcher">
        <button id="btnPlayer" class="role-btn player active" onclick="setRole('player')">PELAAJA</button>
        <button id="btnGM" class="role-btn gm" onclick="setRole('gm')">GAME MASTER</button>
    </div>

    <div class="container">
        <div id="identityCard" class="card" style="display:none;">
            <h2>Tunnistautuminen</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi...">
            <button class="btn btn-primary" onclick="claimIdentity()">ALOITA PELI</button>
        </div>

        <div id="idTag" style="text-align:center; font-size:0.7rem; color:var(--muted); margin-bottom:15px; font-weight:700;"></div>

        <div id="liveTask" class="card task-box" style="display:none;">
            <h2 id="taskPhaseTitle">VAIHE: ILMOITTAUTUMINEN</h2>
            <h1 id="liveTaskName">TEHTÄVÄN NIMI</h1>
            <div id="liveTaskPoints" class="xp-badge" style="display:inline-block; margin-bottom:15px;">0 XP</div>
            
            <p id="liveTaskDesc" class="task-description">Tehtävä paljastetaan pian...</p>

            <div id="notParticipatingMsg" class="not-selected-banner" style="display:none;">
                ET OSALLISTU TÄHÄN TEHTÄVÄÄN
            </div>

            <div id="instructionBox" class="instruction-card" style="display:none;">
                <strong style="color:var(--accent);">OHJEET:</strong>
                <p id="winnerTaskDesc" style="margin-top:5px; font-size:0.9rem;"></p>
            </div>

            <div id="joinAction" style="margin-top:20px;">
                <button id="btnVolu" class="btn btn-primary" onclick="volunteer()">HALUAN OSALLISTUA</button>
                <p id="cooldownWarning" style="color:var(--danger); font-weight:800; display:none; font-size:0.8rem;">OLET JÄÄHYLLÄ!</p>
            </div>

            <div class="gm-only" style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
                <div id="volunteerGrid" class="volunteer-selector-grid"></div>
                
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; gap:10px;">
                        <select id="drawCount" style="flex:1; margin:0;"></select>
                        <button id="btnDraw" class="btn btn-gm" style="flex:2; margin:0;" onclick="drawRandom()">ARVO PELAAJAT</button>
                    </div>
                    <button id="btnLockManual" class="btn btn-success" style="margin:0; font-size:0.75rem; padding:12px;" onclick="lockParticipants()">LUKITSE VALINNAT</button>
                </div>

                <div id="scoringArea"></div>
                
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button id="btnFinish" class="btn btn-success" style="display:none; flex:2; margin:0;" onclick="showScoring()">MERKITSE VALMIIKSI</button>
                    <button id="btnGMSpy" class="btn btn-secondary" style="flex:1; font-size:0.6rem; padding:8px; margin:0;" onclick="toggleGMSpyLocal()">KATSO SPEKSIT</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Leaderboard</h2>
            <div id="playerList"></div>
        </div>

        <div class="gm-only">
            <button class="btn btn-gm" onclick="confirmRandomize()">ARVO UUSI TEHTÄVÄ</button>
            <button class="btn btn-secondary" onclick="toggleAdminPanel()">ADMIN-PANEELI</button>
            
            <div id="adminPanel" class="card" style="display:none; margin-top:15px;">
                <h2>Asetukset</h2>
                <div class="admin-settings-list">
                    <label class="admin-checkbox-label">
                        <input type="checkbox" id="useCooldowns" onchange="updateConfig('useCooldowns', this.checked)"> 
                        <span>Käytä jäähyä</span>
                    </label>
                    <label class="admin-checkbox-label">
                        <input type="checkbox" id="excludeUsedTasks" onchange="updateConfig('excludeUsedTasks', this.checked)"> 
                        <span>Poista käytetyt pakasta</span>
                    </label>
                </div>
                
                <h2 style="margin-top:20px;">Manuaalinen valinta</h2>
                <select id="manualTaskSelect" onchange="selectManualTask(this.value)"></select>

                <h2 style="margin-top:20px;">Pelaajien hallinta</h2>
                <div id="adminPlayerList"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="adminNewPlayerName" placeholder="Nimi..." style="margin:0;">
                    <button class="btn btn-success" style="width:auto; margin:0; padding:10px;" onclick="adminAddPlayer()">LISÄÄ</button>
                </div>

                <h2 style="margin-top:20px;">Muokkaa pakkaa</h2>
                <div class="admin-row-stack">
                    <input type="text" id="newTaskName" placeholder="Tehtävän nimi">
                    <textarea id="newTaskDesc" placeholder="Kuvaus/Ohjeet"></textarea>
                    <div class="admin-task-controls">
                        <div class="point-input-group">
                            <input type="number" id="newTaskPoints" value="2">
                            <label class="minus-label"><input type="checkbox" id="newTaskMinus"> <span>Pistemiinus</span></label>
                        </div>
                        <button class="btn btn-success" onclick="adminCreateTask()">LISÄÄ PAKKAAN</button>
                    </div>
                </div>
                <div id="taskLibraryEditor" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div>

                <button class="btn btn-danger" style="margin-top:30px;" onclick="resetGame()">NOLLAA KOKO PELI</button>
            </div>
        </div>
    </div>

    <div id="xpPopUp" class="xp-popup">+2 XP</div>

    <div id="lotteryWinner" class="winner-announcement" style="display:none;">
        <div class="winner-content">
            <div class="winner-icon">🏆</div>
            <h1 style="margin:0; color:var(--accent);">SINUT VALITTIIN!</h1>
            <p style="font-size:1.2rem; margin:15px 0;" id="winnerTaskName">Tehtävän nimi</p>
            <div class="timer-bar"></div>
            <p style="font-size:0.7rem; color:var(--muted); margin-top:10px;">VALMISTAUDU SUORITTAMAAN</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
