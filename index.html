<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arimon Approt</title>
    <meta name="apple-mobile-web-app-title" content="Arimon Approt">
    <meta name="application-name" content="Arimon Approt">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050507">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker rekisteröity!'))
            .catch(err => console.error('SW Error:', err));
        });
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body class="player-mode">

    <div class="role-switcher">
        <button id="btnPlayer" class="role-btn player active" onclick="setRole('player')">PELAAJA</button>
        <button id="btnGM" class="role-btn gm">GAME MASTER</button>
    </div>

    <div class="container">
        <div id="identityCard" class="card" style="display:none;">
            <h2>Tunnistautuminen</h2>
            <input type="text" id="playerNameInput" placeholder="Syötä nimesi...">
            <button class="btn btn-primary" onclick="claimIdentity()">ALOITA PELI</button>
        </div>

        <div id="idTag" style="text-align:center; font-size:0.7rem; color:var(--muted); margin-bottom:15px; font-weight:700;"></div>

        <div id="activeTasksContainer"></div>

        <div id="liveTask" style="display:none;"></div>

        <div class="card">
            <h2>Leaderboard</h2>
            <div id="playerList"></div>
        </div>

        <div class="gm-only">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <button class="btn btn-gm" onclick="confirmRandomize()">ARVO UUSI TEHTÄVÄ</button>
                <button class="btn btn-secondary" onclick="toggleAdminPanel()">ADMIN-PANEELI</button>
            </div>
            
            <div id="adminPanel" class="card" style="display:none; margin-top:15px;">
                <h2>Pelin säännöt</h2>
                <div class="admin-settings-list">
                    <label class="minus-label">
                        <input type="checkbox" id="useCooldowns" onchange="updateConfig('useCooldowns', this.checked)"> 
                        <span>Käytä jäähyä</span>
                    </label>
                    <label class="minus-label">
                        <input type="checkbox" id="excludeUsedTasks" onchange="updateConfig('excludeUsedTasks', this.checked)"> 
                        <span>Poista käytetyt pakasta</span>
                    </label>
                </div>
                
                <h2 style="margin-top:20px;">Valitse tehtävä manuaalisesti</h2>
                <select id="manualTaskSelect" onchange="selectManualTask(this.value)"></select>

                <h2 style="margin-top:20px;">Pelaajien hallinta</h2>
                <p style="font-size:0.6rem; color:var(--gm-accent); margin-bottom:10px; font-weight:700;">
                    🎂 = SYNTTÄRISANKARI | J = JÄÄHYLLÄ
                </p>
                <div id="adminPlayerList"></div>
                
                <div class="admin-row-stack" style="margin-top:15px;">
                    <input type="text" id="adminNewPlayerName" placeholder="Pelaajan nimi...">
                    <button class="btn btn-success" onclick="adminAddPlayer()">LISÄÄ PELAAJA</button>
                </div>

                <h2 style="margin-top:20px;">Lisää uusi tehtävä pakkaan</h2>
                <div class="admin-row-stack">
                    <input type="text" id="newTaskName" placeholder="Tehtävän nimi">
                    <textarea id="newTaskDesc" placeholder="Kuvaus/Ohjeet"></textarea>
                    
                    <div class="admin-task-controls">
                        <div class="point-input-group">
                            <label style="font-size:0.7rem; color:var(--muted);">Suositeltu pelaajamäärä:</label>
                            <input type="number" id="newTaskRecommendedPlayers" value="1" min="1" max="10">
                            
                            <label style="font-size:0.7rem; color:var(--muted);">Pisteet (XP):</label>
                            <input type="number" id="newTaskPoints" value="2">

                            <div style="display: flex; gap: 15px; margin-top: 5px;">
                                <label class="minus-label">
                                    <input type="checkbox" id="newTaskMinus"> <span>Pistemiinus epäonnistuessa</span>
                                </label>
                                <label class="minus-label" style="color:var(--gm-accent);">
                                    <input type="checkbox" id="newTaskBday"> <span>Synttärisankari-XP</span>
                                </label>
                            </div>
                        </div>
                        <button class="btn btn-success" style="width:100%; margin-top:10px;" onclick="adminCreateTask()">TALLENNA TEHTÄVÄ PAKKAAN</button>
                    </div>
                </div>
                
                <h2 style="margin-top:20px;">Tehtäväkirjasto (Muokkaa pakkaa)</h2>
                <div id="taskLibraryEditor" style="max-height:400px; overflow-y:auto; margin-top:10px; border-top:1px solid #333; padding-top:10px;"></div>

                <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">
                <button class="btn btn-danger" style="width:100%;" onclick="window.resetGame()">NOLLAA KOKO PELI (DATABASE RESET)</button>
            </div>
        </div>
    </div>

    <div id="xpPopUp" class="xp-popup">+2 XP</div>

    <div id="lotteryWinner" class="winner-overlay" style="display:none;">
        <div class="winner-content">
            <h1 style="margin:0;">🎉 SINUT VALITTIIN!</h1>
            <p style="font-size:1.1rem; color:var(--muted); margin:10px 0;">TEHTÄVÄN NIMI:</p>
            <h2 id="winnerTaskName" style="color:var(--accent); font-size:2rem; margin:0 0 20px 0; text-transform: uppercase;">Tehtävän nimi</h2>
            <div style="background:var(--accent); height:4px; width:100%; border-radius:2px; animation: shrink 3s linear forwards;"></div>
            <p style="font-size:0.8rem; color:var(--muted); margin-top:15px; font-weight:900;">VALMISTAUDU SUORITTAMAAN</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
